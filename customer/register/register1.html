<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .shake { animation: shake 0.4s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width:16px; height:16px; border:2px solid rgba(0,0,0,0.2); border-top-color:#111; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
    .toast { position:fixed; bottom:28px; right:28px; color:white; padding:12px 22px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; z-index:100; }
    .toast.show { opacity:1; transform:translateY(0); }
    input.error { box-shadow: 0 0 0 2px #f87171 !important; }
    .error-msg { color:#ef4444; font-size:11px; margin-top:3px; display:none; }
    .error-msg.show { display:block; }
    .pw-wrap { position:relative; }
    .toggle-pw { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9ca3af; padding:0; }
    .toggle-pw:hover { color:#ec4899; }
    /* Password strength bar */
    .strength-bar { height:4px; border-radius:2px; margin-top:6px; transition:all 0.3s; width:0%; }
  </style>
</head>
<body class="bg-pink-100 font-sans">

  <!-- Header -->
  <div class="bg-pink-400 p-4 flex items-center">
    <a href="/customer/login/login.html" class="text-white text-xl mr-4">&larr;</a>
  </div>

  <!-- Main Content -->
  <div class="flex flex-col md:flex-row p-6 gap-6 items-start">

    <!-- Left Section -->
    <div class="md:w-5/6 flex flex-col items-center gap-6 bg-white p-8 rounded-xl shadow-lg">
      <img src="/Photo/logo.jpg" alt="Logo" class="w-32 h-32 object-contain -mt-4" />
      <div class="text-center text-pink-600 font-bold text-3xl leading-tight"></div>

      <!-- Username -->
      <div class="w-72">
        <label class="block text-black font-semibold mb-2 text-left">ป้อนชื่อผู้ใช้ของคุณ</label>
        <input id="reg-username" type="text" placeholder="ชื่อผู้ใช้"
          class="bg-gray-200 shadow-md px-6 py-2 rounded-2xl text-base focus:outline-none focus:ring-2 focus:ring-pink-400 w-full"
          oninput="clearErr('reg-username','err-username')" />
        <p class="error-msg" id="err-username"></p>
      </div>

      <!-- Password -->
      <div class="w-72">
        <label class="block text-black font-semibold mb-2 text-left">ป้อนรหัสผ่านของคุณ</label>
        <div class="pw-wrap">
          <input id="reg-password" type="password" placeholder="รหัสผ่าน"
            class="bg-gray-200 shadow-md px-6 py-2 rounded-2xl text-base focus:outline-none focus:ring-2 focus:ring-pink-400 w-full"
            oninput="clearErr('reg-password','err-password'); checkStrength()" />
          <button class="toggle-pw" onclick="togglePw('reg-password','eye1')">
            <svg id="eye1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Strength bar -->
        <div style="background:#e5e7eb; border-radius:2px; height:4px; margin-top:6px;">
          <div id="strengthBar" class="strength-bar"></div>
        </div>
        <p id="strengthText" class="text-xs mt-1 text-gray-400"></p>
        <p class="text-pink-500 text-xs mt-1">รหัสผ่านเป็นตัวอักษร A-Z และตัวเลข 1-9 ต้องมีอักขระพิเศษ และจำนวนของรหัสผ่านขั้นต่ำ 8 ตัวอักษร</p>
        <p class="error-msg" id="err-password"></p>
      </div>

      <!-- Confirm Password -->
      <div class="w-72">
        <label class="block text-black font-semibold mb-2 text-left">ยืนยันรหัสผ่านของคุณ</label>
        <div class="pw-wrap">
          <input id="reg-confirm" type="password" placeholder="ยืนยันรหัสผ่าน"
            class="bg-gray-200 shadow-md px-6 py-2 rounded-2xl text-base focus:outline-none focus:ring-2 focus:ring-pink-400 w-full"
            oninput="clearErr('reg-confirm','err-confirm')" />
          <button class="toggle-pw" onclick="togglePw('reg-confirm','eye2')">
            <svg id="eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="error-msg" id="err-confirm"></p>
      </div>

      <!-- Email -->
      <div class="w-72">
        <label class="block text-black font-semibold mb-2 text-left">ป้อน E-mail ของคุณ</label>
        <input id="reg-email" type="email" placeholder="E-mail"
          class="bg-gray-200 shadow-md px-6 py-2 rounded-2xl text-base focus:outline-none focus:ring-2 focus:ring-pink-400 w-full"
          oninput="clearErr('reg-email','err-email')"
          onkeydown="if(event.key==='Enter') doRegister()" />
        <p class="error-msg" id="err-email"></p>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 w-72 mt-8 mb-20">
        <a href="/customer/login/login.html" class="w-1/2">
          <button class="bg-gray-400 hover:bg-gray-600 border border-black text-black font-semibold py-2 px-6 rounded-lg w-full shadow transition-all hover:-translate-y-0.5">
            ยกเลิก
          </button>
        </a>
        <button id="registerBtn" onclick="doRegister()"
          class="bg-pink-200 hover:bg-pink-300 border border-black text-black font-semibold py-2 px-6 rounded-lg w-1/2 shadow transition-all hover:-translate-y-0.5">
          ยืนยัน
        </button>
      </div>
    </div>

    <!-- Right Section: Images -->
    <div class="md:w-1/3 flex flex-col gap-6 items-end">
      <img src="/Photo/19.png" alt="Nail Polish" class="rounded shadow w-80" />
    </div>
    <img src="/Photo/20.png" alt="Hair Styling" class="rounded shadow w-80 md:w-2/2" />
    <img src="/Photo/21.png" alt="Salon Interior" class="rounded shadow w-80" />
  </div>

  <div class="toast" id="toast"></div>

  <script src="register.js"></script>

</body>
</html>

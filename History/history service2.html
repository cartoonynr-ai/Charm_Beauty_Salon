<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติการทำรายการ</title>
 
  <!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
 
</head>
 
<body class="bg-white font-sans">
 
  <header class="bg-pink-400 h-20 flex items-center px-6">

     <a href="/History/History1.html" class="text-white">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15 19l-7-7 7-7"/>

  <!-- Layout -->

      <img src="/Photo/logo.jpg" alt="NS Charm Logo" class="w-36 object-contain" />

      <div class="w-[700px]">

<div class="flex gap-10 mb-6">
 
            <div>
<p class="font-semibold mb-2">วันที่</p>
<input type="date"

            <div>

                value="15.00"

          </div>
 
          <!-- Service -->
<div>
<p class="font-semibold mb-3">บริการ</p>
 
            <div class="bg-pink-200 rounded-3xl p-6 flex justify-between items-center shadow-md">
<span class="text-lg">ทาสีเล็บมือ </span>

        </div>

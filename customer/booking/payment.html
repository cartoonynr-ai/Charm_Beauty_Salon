<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      height: 256px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      background: #fce7f3;
      border-color: #ec4899;
    }
    .drop-zone img.preview {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 10px;
    }
    .drop-zone .overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      border-radius: 10px;
    }
    .drop-zone:hover .overlay { opacity: 1; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: white; border-radius: 20px; padding: 36px 40px; width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: popIn 0.25s ease; }
    @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .toast { position: fixed; bottom: 28px; right: 28px; color: white; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .progress-wrap { width: 100%; height: 4px; background: #f3f4f6; border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
    .progress-bar { height: 100%; background: #ec4899; width: 0%; transition: width 0.05s linear; border-radius: 2px; }

    .btn-confirm { transition: all 0.2s; }
    .btn-confirm:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(236,72,153,0.4); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>

<body class="bg-[#FFE6EA] text-gray-800">

<!-- ================= HEADER ================= -->
<div class="bg-pink-400 px-5 py-4 flex items-center flex-shrink-0">
  <a href="/customer/main loged/main loged.html" class="text-white">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <img src="/Photo/logo.jpg" class="h-16 pt-4 object-contain ml-4" onerror="this.style.display='none'" />
</div>

<!-- ================= PAYMENT ================= -->
<section class="flex justify-center items-center py-16">
  <div class="bg-white w-[1200px] rounded-xl p-12 shadow">

    <h2 class="text-center text-3xl font-bold mb-8">Payment</h2>

    <!-- Grey box -->
    <div class="bg-gray-300 rounded-xl p-10 flex gap-16 justify-center">

      <!-- QR CODE -->
      <div class="bg-pink-100 rounded-xl p-6 w-[300px] text-center shadow">
        <img src="/Photo/payment.png" alt="QR Code" class="mx-auto mb-4 w-52 h-52 object-contain"
          onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=CharmBeautySalon'" />
        <div class="text-sm space-y-1">
          <p><span class="font-semibold">ชื่อบัญชี :</span> Charm Beauty Salon</p>
          <p><span class="font-semibold">เลขบัญชี :</span> xxx-x-x-xxxx-x</p>
          <p class="font-semibold text-pink-600">ค่ามัดจำ : 100 บาท</p>
        </div>
        <button onclick="copyAccount()"
          class="mt-3 text-xs text-pink-500 hover:text-pink-700 underline transition-colors">
          คัดลอกเลขบัญชี
        </button>
      </div>

      <!-- SLIP UPLOAD -->
      <div class="bg-pink-100 rounded-xl p-6 w-[300px] text-center shadow">
        <h3 class="font-bold mb-4">Slip</h3>

        <div class="drop-zone" id="dropZone"
          onclick="document.getElementById('slip').click()"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
          ondrop="handleDrop(event)">

          <div id="uploadPrompt">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-gray-400 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12v9m0-9l-3 3m3-3l3 3M12 3v9" />
            </svg>
            <span class="text-sm text-gray-500">คลิกหรือลากไฟล์มาวาง</span>
            <span class="text-xs text-gray-400 mt-1 block">PNG, JPG สูงสุด 5MB</span>
          </div>

          <img id="previewImg" class="preview hidden" />
          <div class="overlay" id="changeOverlay">
            <svg class="w-8 h-8 text-white mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12v9m0-9l-3 3m3-3l3 3M12 3v9"/>
            </svg>
            <span class="text-white text-xs font-semibold">เปลี่ยนรูป</span>
          </div>
        </div>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <p id="fileName" class="text-xs text-gray-500 mt-2 truncate hidden"></p>

        <input id="slip" type="file" accept="image/*" class="hidden" onchange="handleFileSelect(event)" />
      </div>

    </div>

    <!-- Divider -->
    <div class="border-t border-gray-400 my-8"></div>

    <!-- Buttons -->
    <div class="flex justify-end gap-4">
      <a href="/customer/booking/booking1.html"
        class="px-6 py-2 rounded-full border border-gray-500 hover:bg-gray-200 transition-colors">
        Cancel
      </a>
      <button id="confirmBtn" onclick="openConfirmModal()" disabled
        class="btn-confirm px-6 py-2 rounded-full bg-pink-400 text-white">
        Confirm
      </button>
    </div>

  </div>
</section>

<!-- ================= CONFIRM MODAL ================= -->
<div class="modal" id="confirmModal">
  <div class="modal-box">
    <div class="text-5xl mb-4">💳</div>
    <h3 class="text-xl font-bold mb-2">ยืนยันการชำระเงิน?</h3>
    <p class="text-gray-500 text-sm mb-6">กรุณาตรวจสอบ slip ก่อนยืนยัน</p>
    <div class="flex gap-3 justify-center">
      <button onclick="closeConfirmModal()"
        class="px-6 py-2 rounded-full border border-gray-400 hover:bg-gray-100 transition-colors">
        ยกเลิก
      </button>
      <button onclick="submitPayment()"
        class="px-6 py-2 rounded-full bg-pink-400 text-white hover:bg-pink-500 transition-colors">
        ยืนยัน
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/customer/booking/payment.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-100 font-sans">

  <!-- Header -->
  <div class="bg-pink-400 p-4 flex items-center">
    <button class="text-white text-xl mr-4">&larr;</button>
   
  </div>

  <!-- Main Content -->
  <div class="flex flex-col md:flex-row p-6 gap-6 items-start">

<!-- Left Section: Logo + Inputs -->
<div class="md:w-5/6 flex flex-col items-center gap-6 bg-white p-8 rounded-xl shadow-lg">
  
  <div class="text-center text-pink-600 font-bold text-3xl leading-tight">
  
  </div>

<body class="flex items-start justify-start p-10">

  <!-- Logo -->
  <img src="/Photo/logo.jpg" class="w-40 mb-10">

  <!-- Title -->
  <h1 class="text-2xl font-bold mb-4">
    เราจะส่งรหัสคืนให้คุณ
  </h1>

  <!-- Subtitle -->
  <p class="text-gray-600 mb-6">
    ป้อน E-mail ของคุณ
  </p>

  <!-- Email Input -->
  <input type="email"
    placeholder="E-mail"
    class="w-96 bg-gray-200 rounded-full px-6 py-3 mb-8 focus:outline-none">

  <!-- Confirm Button -->
  <button class="w-40 bg-pink-200 hover:bg-pink-300 text-black font-semibold py-2 rounded-full mb-16">
    ยืนยัน
  </button>

  <!-- Bottom Line -->
  <div class="border-t border-gray-300 w-full mt-20"></div>

</div>



    <!-- Right Section: Images -->
    <div class="md:w-1/3 flex flex-col gap-6 items-end">
      <img src="/Photo/19.png" alt="Nail Polish" class="rounded shadow w-80" />
    </div>

    <img src="/Photo/20.png" alt="Hair Styling" class="rounded shadow w-80 md:w-2/2" />
    <img src="/Photo/21.png" alt="Salon Interior" class="rounded shadow w-80" />
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .shake { animation: shake 0.4s ease; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle;
    }

    .toast {
      position: fixed; bottom: 28px; right: 28px;
      color: white; padding: 12px 22px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    input:focus { outline: none; box-shadow: 0 0 0 2px #f472b6; }
    input.error { box-shadow: 0 0 0 2px #f87171; }

    .error-msg { color: #ef4444; font-size: 11px; margin-top: 4px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body class="bg-pink-100 font-sans">

  <!-- Header -->
  <div class="bg-pink-400 px-5 py-4 flex items-center flex-shrink-0">
    <a href="/customer/login/login.html" class="text-white">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
  </div>
  <!-- Main Content -->
  <div class="flex flex-col md:flex-row p-6 gap-6 items-start">

    <!-- Left Section -->
    <div class="md:w-5/6 flex flex-col items-center gap-6 bg-white p-8 rounded-xl shadow-lg">
      <div class="text-center text-pink-600 font-bold text-3xl leading-tight"></div>

      <div class="flex items-start justify-start p-10 flex-col w-full">

        <!-- Logo -->
        <img src="/Photo/logo.jpg" class="w-40 mb-10">

        <!-- Title -->
        <h1 class="text-2xl font-bold mb-4">เราจะส่งรหัสคืนให้คุณ</h1>

        <!-- Subtitle -->
        <p class="text-gray-600 mb-6">ป้อน E-mail ของคุณ</p>

        <!-- Email Input -->
        <input id="emailInput" type="email" placeholder="E-mail"
          class="w-96 bg-gray-200 rounded-full px-6 py-3 mb-1 focus:outline-none"
          oninput="clearErr()"
          onkeydown="if(event.key==='Enter') doSubmit()" />
        <p class="error-msg" id="emailError">กรุณากรอก E-mail ให้ถูกต้อง</p>

        <!-- Confirm Button -->
        <button id="submitBtn" onclick="doSubmit()"
          class="w-40 bg-pink-200 hover:bg-pink-300 text-black font-semibold py-2 rounded-full mt-6 mb-16 transition-all hover:-translate-y-0.5">
          ยืนยัน
        </button>

        <!-- Bottom Line -->
        <div class="border-t border-gray-300 w-full mt-4"></div>

      </div>
    </div>

    <!-- Right Section: Images -->
    <div class="md:w-1/3 flex flex-col gap-6 items-end">
      <img src="/Photo/19.png" alt="Nail Polish" class="rounded shadow w-80" />
    </div>
    <img src="/Photo/20.png" alt="Hair Styling" class="rounded shadow w-80 md:w-2/2" />
    <img src="/Photo/21.png" alt="Salon Interior" class="rounded shadow w-80" />

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="recovery.js"></script>

</body>
</html>

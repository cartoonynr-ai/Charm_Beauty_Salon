<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - NS Charm Beauty Salon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-pink-400 flex items-center justify-center font-sans relative">

<a href="/customer/login/login.html" class="absolute top-6 left-6 text-white">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
    <path d="M15 19l-7-7 7-7"/>
  </svg>
</a>

  <!-- Main Container -->
  <div class="w-full px-20 flex flex-col items-center">

    <!-- Logo -->
    <div class="mb-12 -mt-40">
      <img src="/Photo/logo.jpg" alt="NS Charm Logo" class="w-96 mx-auto" />
    </div>

    <!-- Login Card -->
    <div class="bg-gray-300 rounded-3xl w-full max-w-5xl px-32 py-24 shadow-2xl mb-10 -mt-20">

      <!-- Username / Email -->
      <div class="mb-8">
        <label class="block text-base font-semibold mb-3">
         กรอกชื่อผู้ใช้อีเมล
        </label>
        <input
            id="usernameInput"
            type="text"
          placeholder="ชื่อบัญชีผู้ใช้หรือที่อยู่อีเมล"
          class="w-full px-8 py-4 rounded-full bg-pink-100 border border-black
                 text-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-base font-semibold mb-3">
          กรอกรหัสผ่านของคุณ
        </label>
        <div class="relative">
          <input
            id="passwordInput"
            type="password"
            placeholder="รหัสผ่าน"
            class="w-full px-8 py-4 rounded-full bg-pink-100 border border-black
                   text-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
          />
          <span id="togglePassword" class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer text-xl">
            👁
          </span>
        </div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="flex gap-10 mt-10">
      <a id="signInBtn" href="/Admin/Adminprofile/manage service profile.html"
        class="px-16 py-3 bg-pink-100 border border-black shadow
               hover:bg-pink-200 font-semibold text-lg">
        Sign in
      </a>
    </div>

  </div>

  <script src="loginAdmin.js"></script>

</body>
</html>

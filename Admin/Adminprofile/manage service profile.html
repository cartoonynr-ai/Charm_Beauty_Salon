<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ===== LOGO PREVIEW ===== */
    #logoPreview {
      display: none;
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 8px;
      margin: 0 auto;
    }

    /* ===== LOGO EDIT BUTTON ===== */
    #logoEditBtn {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #logoEditBtn.enabled {
      opacity: 1;
      cursor: pointer;
    }
  </style>
</head>

<body class="bg-pink-200 min-h-screen">

  <!-- ===== TOP BAR ===== -->
  <div class="h-20 bg-pink-400 w-full flex items-center justify-end">
    <div class="flex gap-4">

      <!-- ตั้งค่าบริการ -->
      <button class="flex items-center gap-2 bg-white px-4 py-2 rounded-full text-sm shadow mr-5 border border-black" onclick="location.href='manageserviceday.html'">
        <svg xmlns="http://www.w3.org/2000/svg"
          fill="none" viewBox="0 0 24 24"
          stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 3h7v7H3V3Zm11 0h7v7h-7V3ZM3 14h7v7H3v-7Zm11 3.5a3.5 3.5 0 1 1 7 0a3.5 3.5 0 0 1-7 0Z"/>
        </svg>
        <span class="font-semibold">ตั้งค่าบริการ</span>
      </button>

      <!-- ออกจากระบบ -->
      <button class="flex items-center gap-2 bg-white px-4 py-2 rounded-full text-sm shadow mr-40 border border-black">
        <svg xmlns="http://www.w3.org/2000/svg"
          fill="none" viewBox="0 0 24 24"
          stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 12H9m6-3l3 3-3 3"/>
        </svg>
        <span class="font-semibold">ออกจากระบบ</span>
      </button>

    </div>
  </div>

  <!-- ===== LAYOUT ===== -->
  <div class="flex">

    <!-- LEFT -->
    <div class="w-32 bg-pink-200">
      <img src="/Photo/logo.jpg" class="w-full object-contain">
    </div>

    <!-- CENTER -->
    <div class="relative mx-auto bg-white rounded-2xl p-8 w-[calc(100%-14rem)] min-h-screen">

      <!-- EDIT BUTTON -->
      <div class="flex justify-end pr-60 mt-6 mb-1">
        <div id="editBtn" class="inline-flex items-center gap-2 text-sm cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg"
            fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor"
            class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16.862 4.487a2.25 2.25 0 1 1 3.182 3.182L7.5 20.213 3 21l.787-4.5L16.862 4.487Z"/>
          </svg>
          <span>แก้ไข</span>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-center mb-2">โปรไฟล์</h1>

      <!-- BOX -->
      <div class="bg-gray-300 rounded-2xl w-4/6 mx-auto min-h-[600px] p-10">

        <div class="grid grid-cols-2 gap-12">

          <!-- LEFT -->
          <div>
            <label class="block text-2xl font-semibold mb-6 mt-10">ชื่อ</label>
            <input type="text"
              class="profile-input w-full rounded-lg px-4 py-2 border border-black bg-gray-100"
              value="CharmAdmin" readonly>

            <div class="mt-10">
              <label class="block text-2xl font-semibold mb-6">อีเมล</label>
              <input type="email"
                class="profile-input w-full rounded-lg px-4 py-2 border border-black bg-gray-100"
                value="CharmAdmin@gmail.com" readonly>
            </div>
          </div>

          <!-- RIGHT -->
          <div>
            <label class="block text-2xl font-semibold mb-6 mt-10">เบอร์โทรศัพท์</label>
            <input type="text"
              class="profile-input w-full rounded-lg px-4 py-2 border border-black bg-gray-100"
              value="085-6218731" readonly>

            <!-- Logo -->
            <div class="mt-20 flex flex-col justify-center items-center gap-2 text-2xl">

              <!-- ตัวอย่างรูป logo ปัจจุบัน -->
              <img id="logoPreview" src="/Photo/logo.jpg" alt="Logo Preview" />

              <!-- ปุ่ม Logo + แก้ไข -->
              <div id="logoEditBtn" class="flex items-center gap-2 cursor-pointer">
                <span>Logo</span>
                <svg xmlns="http://www.w3.org/2000/svg"
                  fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor"
                  class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.862 4.487a2.25 2.25 0 1 1 3.182 3.182L7.5 20.213 3 21l.787-4.5L16.862 4.487Z"/>
                </svg>
              </div>

              <!-- hidden file input -->
              <input type="file" id="logoFileInput" accept="image/*" class="hidden" />

            </div>

          </div>

        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div id="actionButtons"
        class="hidden justify-end gap-4 w-4/6 mx-auto mt-6">

        <button id="cancelBtn"
          class="px-6 py-2 rounded-xl border border-black bg-gray-300 hover:bg-gray-400">
          ยกเลิก
        </button>

        <button id="saveBtn"
          class="px-6 py-2 rounded-xl border border-black bg-pink-200 hover:bg-pink-300">
          ยืนยัน
        </button>

      </div>

    </div>

    <div class="w-32 bg-pink-200"></div>
  </div>

  <script src="/logo.js"></script>
  <script src="manage service profile.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-6px); }
  40%,80%  { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block; vertical-align: middle;
}

.toast {
  position: fixed; bottom: 28px; right: 28px;
  color: white; padding: 12px 22px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }

input:focus { outline: none; box-shadow: 0 0 0 2px #f472b6; border-color: #f472b6 !important; }
input.error { border-color: #f87171 !important; box-shadow: 0 0 0 2px #fca5a5 !important; }

.error-msg { color: #ef4444; font-size: 11px; margin-top: 3px; display: none; }
.error-msg.show { display: block; }

.pw-wrap { position: relative; }
.toggle-pw {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: #9ca3af; padding: 0;
}
.toggle-pw:hover { color: #ec4899; }
  </style>
</head>
<body class="bg-pink-100 font-sans">

  <!-- Header -->
  <header class="bg-pink-400 h-20 flex items-center px-6">
    <a href="/customer/login/login.html" class="text-white">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
  </header>

  <!-- Main Content -->
  <div class="flex flex-col md:flex-row p-6 gap-6 items-start">

    <!-- Left Section -->
    <div class="md:w-5/6 flex flex-col items-center gap-6 bg-white p-6 rounded-xl shadow">
      <img src="/Photo/logo.jpg" alt="Logo" class="w-250 h-100 object-contain -mt-6" />
      <div class="text-center text-pink-600 font-bold text-4xl leading-tight"></div>

      <!-- Username -->
      <div class="w-72">
        <label class="block text-black-600 font-semibold mb-1 text-left -mt-20">Enter your username</label>
        <input id="username" type="text" placeholder="username"
          class="bg-gray-200 rounded-2xl border border-gray-400 shadow-md px-8 py-3 text-xl w-full focus:outline-none"
          oninput="clearErr('username','username-error')"
          onkeydown="if(event.key==='Enter') document.getElementById('password').focus()" />
        <p class="error-msg" id="username-error">กรุณากรอก username</p>
      </div>

      <!-- Password -->
      <div class="w-72">
        <label class="block text-black-600 font-semibold mb-1 text-left">Enter your password</label>
        <div class="pw-wrap">
          <input id="password" type="password" placeholder="password"
            class="bg-gray-200 rounded-2xl border border-gray-400 shadow-md px-8 py-3 text-xl w-full focus:outline-none"
            oninput="clearErr('password','password-error')"
            onkeydown="if(event.key==='Enter') doLogin()" />
          <button class="toggle-pw" onclick="togglePw()" title="แสดง/ซ่อน">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="error-msg" id="password-error">กรุณากรอกรหัสผ่าน</p>
      </div>

      <!-- Forgot Password -->
      <div class="w-72 text-right">
        <a href="/customer/recovery/recovery.html" class="text-sm text-pink-500 hover:underline">Forgot password?</a>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 w-72">
        <a href="/customer/register/register1.html" class="w-1/2">
          <button class="rounded-2xl bg-pink-200 hover:bg-pink-300 border border-black font-semibold py-2 px-6 w-full transition-all hover:-translate-y-0.5">Sign up</button>
        </a>
        <button id="loginBtn" onclick="doLogin()"
          class="rounded-2xl bg-pink-200 hover:bg-pink-300 border border-black font-semibold py-2 px-6 w-1/2 transition-all hover:-translate-y-0.5">
          Log in
        </button>
      </div>
    </div>

    <!-- Right Section: Images -->
    <div class="md:w-1/3 flex flex-col gap-6 items-end">
      <img src="/Photo/19.png" alt="Nail Polish" class="rounded shadow w-80" />
    </div>
    <img src="/Photo/20.png" alt="Hair Styling" class="rounded shadow w-80 md:w-2/2" />
    <img src="/Photo/21.png" alt="Salon Interior" class="rounded shadow w-80" />
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="login1.js"></script>

</body>
</html>

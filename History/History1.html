<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ประวัติการทำรายการ | NS Charm Beauty Salon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

  <div class="bg-pink-400 px-5 py-4 flex items-center flex-shrink-0">
    <a href="/customer/Profile/profile.html" class="text-white">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
  </div>

  <div class="flex flex-1">

    <div class="w-48 bg-pink-200 flex flex-col items-center pt-6 flex-shrink-0 border-r border-pink-200">
      <img src="/Photo/logo.jpg" alt="NS Charm Logo" class="w-36 object-contain" />
    </div>

    <div class="flex-1 px-12 py-8">

      <h1 class="text-3xl font-bold text-center text-gray-900 mb-8">ประวัติการทำรายการ</h1>

      <div class="bg-gray-400 rounded-2xl shadow-md overflow-hidden border border-gray-300 max-w-4xl mx-auto mt-20">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-pink-200 text-gray-800 font-bold">
              <th class="py-4 px-6 text-center border-r border-gray-300 w-40">วันที่</th>
              <th class="py-4 px-6 text-center border-r border-gray-300">รายการ</th>
              <th class="py-4 px-6 text-center border-r border-gray-300 w-36">สถานะ</th>
              <th class="py-4 px-6 text-center w-32">รายละเอียด</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200 text-base">

            <tr class="hover:bg-pink-50 transition">
              <td class="py-5 px-6 text-center border-r border-gray-200 font-medium">20/12/2025</td>
              <td class="py-5 px-6 border-r border-gray-200">ย้อมสีผม</td>
              <td id="status_booking_1" class="py-5 px-6 text-center border-r border-gray-200">จองคิวสำเร็จ</td>
              <td class="py-5 px-6 text-center">
                <a href="/History/Cancel.html" class="text-red-500 font-bold hover:underline">คลิก</a>
              </td>
            </tr>

            <tr class="hover:bg-pink-50 transition">
              <td class="py-5 px-6 text-center border-r border-gray-200 font-medium">12/12/2025</td>
              <td class="py-5 px-6 border-r border-gray-200">ทาสีเล็บมือ / เท้า</td>
              <td class="py-5 px-6 text-center border-r border-gray-200">เสร็จสิ้นบริการ</td>
              <td class="py-5 px-6 text-center">
                <a href="/History/history service.html" class="text-red-500 font-bold hover:underline">คลิก</a>
              </td>
            </tr>

            <tr class="hover:bg-pink-50 transition">
              <td class="py-5 px-6 text-center border-r border-gray-200 font-medium">01/11/2025</td>
              <td class="py-5 px-6 border-r border-gray-200">ทาสีเล็บมือ</td>
              <td class="py-5 px-6 text-center border-r border-gray-200">เสร็จสิ้นบริการ</td>
              <td class="py-5 px-6 text-center">
                <a href="/History/history service2.html" class="text-red-500 font-bold hover:underline">คลิก</a>
              </td>
            </tr>

            <tr>
              <td class="py-10 border-r border-gray-200"></td>
              <td class="py-10 border-r border-gray-200"></td>
              <td class="py-10 border-r border-gray-200"></td>
              <td class="py-10"></td>
            </tr>

          </tbody>
        </table>
      </div>

      <div class="border-t border-gray-300 mt-12 max-w-4xl mx-auto"></div>

    </div>
  </div>
  <script src="History1.js">
    
  </script>

</body>
</html>

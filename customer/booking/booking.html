<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charm Beauty | Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .cal-day:hover:not(.disabled):not(.empty) { background: #fbcfe8; }
    .cal-day.selected { background: #ec4899; color: white; }
    .cal-day.today { border: 2px solid #ec4899; color: #ec4899; }
    .cal-day.today.selected { color: white; border-color: #ec4899; }
    .cal-day.disabled { color: #d1d5db; cursor: not-allowed; }
    .cal-day.empty { cursor: default; }
    .cal-header-day { text-align: center; font-size: 12px; font-weight: 700; color: #9d174d; padding: 4px 0; }
  </style>
</head>

<body class="bg-[#FFE6EA]">

<!-- Header -->
<header class="bg-pink-400 h-20 flex items-center px-6">
  <a href="/customer/main loged/main loged.html" class="text-white">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
</header>

<!-- Content box -->
<div class="max-w-7xl mx-auto mt-6 bg-white rounded-3xl shadow overflow-hidden">
  <div class="flex min-h-[650px]">

    <!-- Left panel -->
    <div class="w-1/4 bg-[#FFE6EA] flex items-center justify-center">
      <img src="/Photo/logo.jpg" class="w-48" />
    </div>

    <!-- Booking panel -->
    <div class="w-3/4 p-12 relative">

      <!-- Date -->
      <div class="mb-6">
        <label class="font-bold text-2xl block mb-2">วันที่</label>
        <div class="relative inline-block">

          <button id="dateDisplay" onclick="toggleCalendar()"
            class="bg-pink-100 border border-gray-400 rounded-lg px-5 py-2 text-lg font-semibold flex items-center gap-3 hover:bg-pink-200 transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            <span id="dateLabel" class="text-gray-500">เลือกวันที่</span>
          </button>

          <!-- Calendar Popup -->
          <div id="calendarPopup"
            class="hidden absolute top-12 left-0 z-50 bg-white border border-pink-200 rounded-2xl shadow-xl p-4"
            style="width:280px;">

            <div class="flex items-center justify-between mb-3">
              <button onclick="prevMonth()" class="w-8 h-8 rounded-full hover:bg-pink-100 flex items-center justify-center text-pink-600 font-bold text-xl">‹</button>
              <span id="monthLabel" class="font-bold text-gray-800 text-sm"></span>
              <button onclick="nextMonth()" class="w-8 h-8 rounded-full hover:bg-pink-100 flex items-center justify-center text-pink-600 font-bold text-xl">›</button>
            </div>

            <div class="calendar-grid mb-1">
              <div class="cal-header-day">อา</div>
              <div class="cal-header-day">จ</div>
              <div class="cal-header-day">อ</div>
              <div class="cal-header-day">พ</div>
              <div class="cal-header-day">พฤ</div>
              <div class="cal-header-day">ศ</div>
              <div class="cal-header-day">ส</div>
            </div>

            <div class="calendar-grid" id="daysGrid"></div>

          </div>
        </div>
      </div>

      <!-- Time slots -->
      <div id="timeSlots" class="bg-gray-300 rounded-3xl p-5 space-y-2 w-[520px]"></div>

      <!-- Booking button -->
      <div class="absolute bottom-10 right-10">
        <button id="bookBtn" disabled
          class="px-10 py-3 rounded-full bg-gray-200 text-xl font-bold border cursor-not-allowed">
          การจอง
        </button>
      </div>

    </div>
  </div>
</div>

<script src="/customer/booking/booking.js"></script>

</body>
</html>

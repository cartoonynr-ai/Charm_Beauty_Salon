<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติการทำรายการ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white font-sans">

  <header class="bg-pink-400 h-20 flex items-center px-6">
    <a href="/History/History1.html" class="text-white">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
  </header>

  <div class="flex min-h-screen">

    <div class="w-48 bg-pink-200 flex flex-col items-center pt-6 flex-shrink-0 border-r border-pink-200">
      <img src="/Photo/logo.jpg" alt="NS Charm Logo" class="w-36 object-contain" />
    </div>

    <div class="flex-1 flex justify-center pt-10">
      <div class="w-[700px]">

        <h2 class="text-3xl font-bold text-center mb-6">ประวัติการทำรายการ</h2>

        <div class="bg-gray-300 rounded-2xl p-8 shadow-inner">

          <div class="flex gap-10 mb-6">
            <div>
              <p class="font-semibold mb-2">วันที่</p>
              <input type="date" value="2025-12-20"
                class="rounded-full px-4 py-1 shadow border">
            </div>
            <div>
              <p class="font-semibold mb-2">เวลา</p>
              <input type="text" value="13.00"
                class="rounded-full px-4 py-1 shadow border w-40">
            </div>
          </div>

          <div>
            <p class="font-semibold mb-3">บริการ</p>
            <div class="bg-pink-200 rounded-3xl p-6 flex justify-between items-center shadow-md">
              <span class="text-lg">ย้อมสีผม</span>
              <span class="font-semibold">350 บาท</span>
            </div>
          </div>

          <div class="mt-6 flex items-center gap-3">
            <p class="font-semibold">สถานะ :</p>
            <span id="statusBadge" class="px-4 py-1 rounded-full text-sm font-semibold bg-blue-100 text-blue-600">
              จองคิวสำเร็จ
            </span>
          </div>

          <div class="flex justify-end mt-8">
            <button id="cancelBtn" onclick="handleCancel()"
              class="bg-white px-6 py-2 rounded-full shadow-md text-red-600 font-semibold hover:bg-red-50 transition inline-block">
              ยกเลิก
            </button>
          </div>

        </div>

        <hr class="mt-10 border-gray-400">

      </div>
    </div>
  </div>

  <!-- Modal ยืนยัน -->
  <div id="confirmModal"
    class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl shadow-2xl p-10 w-80 text-center">
      <p class="text-xl font-bold text-gray-800 mb-2">ยืนยันการยกเลิก</p>
      <p class="text-sm text-gray-500 mb-8">คุณต้องการยกเลิกการจองนี้ใช่หรือไม่?</p>
      <div class="flex gap-4 justify-center">
        <button onclick="closeModal()"
          class="px-6 py-2 rounded-full border border-gray-300 text-gray-600 hover:bg-gray-100 font-semibold transition">
          ไม่ใช่
        </button>
        <button onclick="confirmCancel()"
          class="px-6 py-2 rounded-full bg-red-500 hover:bg-red-600 text-white font-semibold transition">
          ยืนยัน
        </button>
      </div>
    </div>
  </div>

  <script src="Cancel.js">

  </script>

</body>
</html>

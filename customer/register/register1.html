<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-100 font-sans">

  <!-- Header -->
  <div class="bg-pink-400 p-4 flex items-center">
    <button class="text-white text-xl mr-4">&larr;</button>
   
  </div>

  <!-- Main Content -->
  <div class="flex flex-col md:flex-row p-6 gap-6 items-start">

<!-- Left Section: Logo + Inputs -->
<div class="md:w-5/6 flex flex-col items-center gap-6 bg-white p-8 rounded-xl shadow-lg">
  <img src="/Photo/logo.jpg" alt="Logo" class="w-32 h-32 object-contain -mt-4" />
  <div class="text-center text-pink-600 font-bold text-3xl leading-tight">
  
  </div>

  <!-- Username Input -->
  <div class="w-72">
    <label class="block text-black font-semibold mb-2 text-left">Enter your username</label>
    <input type="text" placeholder="username" class="bg-gray-200 shadow-md px-6 py-2 rounded-lg text-base focus:outline-none focus:ring-2 rounded-2xl :ring-pink-400 w-full" />
  </div>

  <!-- Password Input -->
  <div class="w-72">
    <label class="block text-black font-semibold mb-2 text-left">Enter your password</label>
    <input type="password" placeholder="password" class="bg-gray-200 shadow-md px-6 py-2 rounded-lg text-base focus:outline-none focus:ring-2 rounded-2xl :ring-pink-400 w-full" />
  </div>

  <!-- Phone Number Input -->
  <div class="w-72">
    <label class="block text-black font-semibold mb-2 text-left">Enter your phone number</label>
    <input type="text" placeholder="phone number" class="bg-gray-200 shadow-md px-6 py-2 rounded-lg text-base focus:outline-none focus:ring-2 rounded-2xl :ring-pink-400 w-full"/>
  </div>

  <!-- Email Input -->
  <div class="w-72">
    <label class="block text-black font-semibold mb-2 text-left">Enter your E-mail</label>
    <input type="email" placeholder="E-mail" class="bg-gray-200 shadow-md px-6 py-2 rounded-lg text-base focus:outline-none focus:ring-2 rounded-2xl :ring-pink-400 w-full" />
  </div>

  <!-- Buttons -->
  <div class="flex gap-4 w-72 mt-8 mb-20">
    <button class="bg-pink-500 hover:bg-pink-600 border border-black text-white font-semibold py-2 px-6 rounded-lg w-1/2 shadow">Cancel</button>
    <button class="bg-pink-500 hover:bg-pink-600 border border-black text-white font-semibold py-2 px-6 rounded-lg w-1/2 shadow">Confirm</button>
  </div>
</div>

    <!-- Right Section: Images -->
    <div class="md:w-1/3 flex flex-col gap-6 items-end">
      <img src="/Photo/19.png" alt="Nail Polish" class="rounded shadow w-80" />
    </div>

    <img src="/Photo/20.png" alt="Hair Styling" class="rounded shadow w-80 md:w-2/2" />
    <img src="/Photo/21.png" alt="Salon Interior" class="rounded shadow w-80" />
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .shake { animation: shake 0.4s ease; }
    .toast { position:fixed; bottom:28px; right:28px; color:white; padding:12px 22px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; z-index:100; }
    .toast.show { opacity:1; transform:translateY(0); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:50; align-items:center; justify-content:center; }
    .modal.show { display:flex; }
    .modal-box { background:white; border-radius:20px; padding:36px 40px; width:360px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:popIn 0.25s ease; }
    @keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
    input:focus { outline:none; }
    input.error { ring: 2px solid #f87171 !important; box-shadow: 0 0 0 2px #f87171; }
  </style>
</head>

<body class="bg-pink-100 font-sans min-h-screen flex flex-col">

<header class="bg-pink-400 h-20 flex items-center px-6">
  <a href="/customer/main loged/main loged.html" class="text-white">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
</header>

<!-- Content Area -->
<div class="flex flex-1">

  <!-- Sidebar -->
  <div class="bg-pink-200 resize-x overflow-auto p-6 text-white flex flex-col items-center" style="width:250px;">
    <img src="/Photo/logo.jpg" alt="NS Charm Logo"
         class="w-40 h-40 rounded-full mb-10 object-cover" />
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-start justify-center">
    <div class="bg-white w-full h-full p-8">

      <!-- Title -->
      <div class="flex justify-center mt-10">
        <span class="font-semibold text-4xl">Your Profile</span>
      </div>

      <!-- Form -->
      <div class="space-y-6 text-gray-700 mb-6 mt-10">

        <!-- Username -->
        <div>
          <label class="block text-black font-semibold mb-2 text-2xl">Username</label>
          <input id="username" type="text" placeholder="Customer001"
            class="pl-5 bg-gray-200 shadow-md px-40 py-2 rounded-2xl
                   text-base focus:outline-none focus:ring-2 focus:ring-pink-400" />
        </div>

        <!-- Email + History -->
        <div class="flex items-center">
          <div>
            <label class="block text-black font-semibold mb-2 text-2xl">Email</label>
            <input id="email" type="text" placeholder="Customer001@gmail.com"
              class="pl-5 bg-gray-200 shadow-md px-40 py-2 rounded-2xl
                     text-base focus:outline-none focus:ring-2 focus:ring-pink-400" />
          </div>

          <!-- History Button -->
          <a href="/History/History1.html"
             class="ml-auto w-24 h-24 rounded-full mr-64
                    bg-pink-300 text-white font-semibold text-sm shadow-md
                    flex flex-col items-center justify-center hover:bg-pink-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke-width="2" stroke="white"
                 class="w-10 h-10 mb-1">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            History
          </a>
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-black font-semibold mb-2 text-2xl">Phone Number</label>
          <input id="phone" type="text" placeholder="099-999-9999"
            class="pl-5 bg-gray-200 shadow-md px-40 py-2 rounded-2xl
                   text-base focus:outline-none focus:ring-2 focus:ring-pink-400" />
        </div>

        <!-- Save + Logout -->
        <div class="flex justify-between items-center mt-20">
          <button onclick="saveProfile()"
            class="border-2 border-pink-400 text-pink-500
                   px-8 py-3 rounded-full font-semibold
                   shadow-md hover:bg-pink-400 hover:text-white
                   transition duration-300">
            บันทึก
          </button>

          <button onclick="openLogoutModal()"
            class="border-2 border-red-500 text-red-500
                   px-8 py-3 rounded-full font-semibold
                   shadow-md hover:bg-red-500 hover:text-white
                   transition duration-300">
            ออกจากระบบ
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Logout Modal -->
<div class="modal" id="logoutModal">
  <div class="modal-box">
    <div class="text-5xl mb-4">👋</div>
    <h3 class="text-xl font-bold mb-2">ออกจากระบบ?</h3>
    <p class="text-gray-500 text-sm mb-6">คุณต้องการออกจากระบบใช่ไหม?</p>
    <div class="flex gap-3 justify-center">
      <button onclick="closeLogoutModal()"
        class="px-6 py-2 rounded-full border border-gray-400 hover:bg-gray-100 transition-colors">
        ยกเลิก
      </button>
      <button  onclick="confirmLogout()"
        class="px-6 py-2 rounded-full bg-red-500 text-white hover:bg-red-600 transition-colors">
        ออกจากระบบ 
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/customer/Profile/profile.js "></script>

</body>
</html>

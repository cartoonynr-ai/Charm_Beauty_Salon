<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charm Beauty & Salon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #tab-price, #tab-promo { display: block; }
    #tab-price.hidden, #tab-promo.hidden { display: none; }
    #btn-price.active, #btn-promo.active { font-weight: 700; text-decoration: underline; }
  </style>
</head>

<body class="bg-[#FFE6EA] text-gray-800">

<!-- HEADER -->
<header class="bg-pink-400 h-20 flex items-center justify-between px-10">
  <a href="index.html" class="flex items-center h-full">
    <img src="/Photo/logo.jpg" alt="Charm Beauty Logo" class="h-full max-h-[64px] w-auto object-contain" />
  </a>
  <a href="/customer/login/login.html" class="flex items-center gap-2 text-white hover:text-gray-200 transition">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 22c0-4 4-6 8-6s8 2 8 6"/>
    </svg>
    <span class="text-sm font-medium">Sign in</span>
  </a>
</header>

<!-- HERO / PROMO IMAGES -->
<section class="w-full min-h-[180px] bg-[#EED2D7]">
  <div id="promoContainer" class="max-w-6xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 p-4"></div>
</section>

<!-- SHOP INFO -->
<section class="flex justify-center gap-10 py-16">
  <div class="bg-white rounded-2xl p-8 w-[420px] shadow">
    <h2 id="shopName" class="text-xl font-bold mb-3">Charm Beauty</h2>
    <p id="shopAddress">หน้ามอพะเยา ซอยข้างพีเจไนท์</p>
    <p id="shopPhone" class="mt-2">เบอร์โทรติดต่อ : 085-6218731</p>
  </div>
  <div class="w-[420px] h-[240px] rounded-xl overflow-hidden shadow">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d235.73922957049268!2d99.92304002022807!3d19.02731378955737!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2s!5e0!3m2!1sth!2sth!4v1772447138390!5m2!1sth!2sth"
      width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</section>

<!-- PRICE / PROMOTION -->
<section class="bg-white mx-auto max-w-6xl rounded-2xl shadow py-16 mb-20 text-center">

  <h2 class="text-2xl font-bold mb-2">ราคา</h2>
  <p class="text-pink-500 mb-10">
    <a href="#" id="btn-price" class="font-semibold">ราคา</a>
    |
    <a href="#" id="btn-promo" class="hover:underline text-pink-600">โปรโมชั่น</a>
  </p>

  <!-- TAB: PRICE -->
  <div id="tab-price">
    <!-- render by main.js -->
  </div>

  <!-- TAB: PROMOTION -->
  <div id="tab-promo" class="hidden">
    <!-- render by main.js -->
  </div>

</section>

<!-- FOOTER -->
<footer class="bg-pink-400 text-white py-10">
  <div class="flex justify-around text-sm">
    <div>
      <h4 class="font-bold mb-2">เกี่ยวกับ Charm Beauty & Salon</h4>
      <p>เกี่ยวกับเรา</p>
      <p>นโยบายความเป็นส่วนตัว</p>
      <p>เงื่อนไขการใช้งาน</p>
    </div>
    <div>
      <h4 class="font-bold mb-2">บริการลูกค้า</h4>
      <p>ติดต่อเรา</p>
      <p>คำถามที่พบบ่อย</p>
    </div>
    <div class="font-bold text-lg self-end">
      Charm Beauty & Salon<br/><span class="text-sm font-normal">ร้านทำเล็บ</span>
    </div>
  </div>
</footer>

<script src="/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FFE6EA] text-gray-800">

<!-- ================= HEADER ================= -->
<header class="bg-pink-400 h-20 flex items-center px-6 gap-4">
  <a href="booking1.html" class="text-white">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </a>

  <img src="assets/logo.jpg" class="h-12" />
</header>

<!-- ================= PAYMENT ================= -->
<section class="flex justify-center items-center py-16">

  <div class="bg-white w-[1200px] rounded-xl p-12 shadow">

    <h2 class="text-center text-3xl font-bold mb-8">Payment</h2>

    <!-- Grey box -->
    <div class="bg-gray-300 rounded-xl p-10 flex gap-16 justify-center">

      <!-- QR CODE -->
      <div class="bg-pink-100 rounded-xl p-6 w-[300px] text-center shadow">
        <img src="assets/payment.png" alt="QR Code" class="mx-auto mb-4 w-52 h-52" />

        <div class="text-sm space-y-1">
          <p><span class="font-semibold">ชื่อบัญชี :</span> Charm Beauty Salon</p>
          <p><span class="font-semibold">เลขบัญชี :</span> xxx-x-x-xxxx-x</p>
          <p class="font-semibold">ค่ามัดจำ : 100 บาท</p>
        </div>
      </div>

      <!-- SLIP UPLOAD -->
      <div class="bg-pink-100 rounded-xl p-6 w-[300px] text-center shadow">
        <h3 class="font-bold mb-4">Slip</h3>

        <label
          for="slip"
          class="border-2 border-dashed border-gray-400 rounded-xl h-64 flex flex-col items-center justify-center cursor-pointer hover:bg-pink-200 transition"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mb-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12v9m0-9l-3 3m3-3l3 3M12 3v9" />
          </svg>
          <span class="text-sm text-gray-600">Upload Slip</span>
        </label>

        <input id="slip" type="file" class="hidden" />
      </div>

    </div>

    <!-- Divider -->
    <div class="border-t border-gray-400 my-8"></div>

    <!-- Buttons -->
    <div class="flex justify-end gap-4">
      <a href="booking1.html"
         class="px-6 py-2 rounded-full border border-gray-500 hover:bg-gray-200">
        Cancel
      </a>

      <a href="thankyou.html"
   class="px-6 py-2 rounded-full bg-pink-400 text-white hover:bg-pink-500">
  Confirm
</a>
    </div>

  </div>

</section>

</body>
</html>

  <!-- Layout หลัก -->

    <!-- แถบซ้าย -->

        <img src="/Photo/logo.jpg" class="h-50 w-auto object-contain">
    </div>

    <!-- กลาง (กรอบขาวเต็มหน้า) -->
<div class="relative mx-auto bg-white rounded-2xl p-8 w-[calc(100%-14rem)] min-h-screen">

<div class="text-right text-sm mb-1 cursor-pointer pr-60 mt-6">✏️ แก้ไข</div>

          </div>

            <div class="mt-20 mb-6 text-center text-2xl mr-5">
              Logo ✏️
            </div>
          </div>
